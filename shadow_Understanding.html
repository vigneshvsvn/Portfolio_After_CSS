<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Text Shadow Demo</title>

  <style>

    body{
      background:black;
      color:white;
      font-family:Arial;
      padding:40px;
    }

    h1{
      font-size:60px;
      margin-bottom:50px;
    }

    /* No Shadow */
    .one{
      text-shadow: 0 0 0 black;
    }

    /* Right + Bottom Shadow */
    .two{
      text-shadow: 5px 5px 0 red;
    }

    /* Soft Shadow */
    .three{
      text-shadow: 5px 5px 10px blue;
    }

    /* Neon Glow */
    .four{
      text-shadow: 0 0 20px cyan;
    }

    /* Left Side Shadow */
    .five{
      text-shadow: -5px 0 10px orange;
    }

    /* Upward Shadow */
    .six{
      text-shadow: 0 -5px 10px lime;
    }

  </style>
</head>

<body>

  <h1 class="one">No Shadow</h1>

  <h1 class="two">Right Bottom Shadow</h1>

  <h1 class="three">Soft Blur Shadow</h1>

  <h1 class="four">Neon Glow Effect</h1>

  <h1 class="five">Left Shadow</h1>

  <h1 class="six">Up Shadow</h1>

</body>
</html>
